        <body>
            <div class="title">
                <h1>Vim Cheatsheet</h1>
            </div>
            <div class="caption">
                <p>Below are a list of very helpful VIM commands for getting to know the editor for the first time.</p>
            </div>
            <div class="section">
                <figure>
                    <h3>Movement</h3>
                    <figcaption class="save-and-quit-note">How to move around the editor (no mouse!)</figcaption>
                    <ul>
                        <li>h - move left</li>
                        <li>j - move down (looks like a down arrow, easier to remember)</li>
                        <li>k - move up</li>
                        <li>l - move right</li>
                    </ul>
                </figure>
                <figure>
                    <h3>Edit (Write Stuff)</h3>
                    <figcaption class="save-and-quit-note">How to actually write anything</figcaption>
                        <ul>   
                            <li>a - edit (after cursor)</li>
                            <li>A - edit (end-of-line)</li>
                            <li>i - edit (before cursor)</li>
                            <li>I - edit (begin-of-line)</li>
                        </ul>
                </figure>
                <figure>
                    <h3>Commands</h3>
                    <figcaption class="save-and-quit-note">How to save and quit the terminal</figcaption>
                    <em class="save-and-quit-note">* - Press : to enter command mode, then type the following</em>
                    <ul>
                        <li>w - save your work</li>
                        <li>q - quit (will warn you if work is not saved)</li>
                        <li>! - force command</li>
                        <li>q! - force quit</li>
                        <li>wq - save then quit</li>
                    </ul>
                </figure>
            </div>
        </body>
